services:
  node1:
    build:
      context: ./services/qflag
    environment:
      NODE_ID: node-1
      HTTP_ADDR: :8080
      DATA_DIR: /data
      PEERS: node-2=http://node2:8080,node-3=http://node3:8080
      PUBLIC_URL: http://localhost:8081
      API_TOKEN: ${API_TOKEN:?set API_TOKEN in your environment}
      RAFT_TOKEN: ${RAFT_TOKEN:?set RAFT_TOKEN in your environment}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8081:8080"
    volumes:
      - node1-data:/data

  node2:
    build:
      context: ./services/qflag
    environment:
      NODE_ID: node-2
      HTTP_ADDR: :8080
      DATA_DIR: /data
      PEERS: node-1=http://node1:8080,node-3=http://node3:8080
      PUBLIC_URL: http://localhost:8082
      API_TOKEN: ${API_TOKEN:?set API_TOKEN in your environment}
      RAFT_TOKEN: ${RAFT_TOKEN:?set RAFT_TOKEN in your environment}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8082:8080"
    volumes:
      - node2-data:/data

  node3:
    build:
      context: ./services/qflag
    environment:
      NODE_ID: node-3
      HTTP_ADDR: :8080
      DATA_DIR: /data
      PEERS: node-1=http://node1:8080,node-2=http://node2:8080
      PUBLIC_URL: http://localhost:8083
      API_TOKEN: ${API_TOKEN:?set API_TOKEN in your environment}
      RAFT_TOKEN: ${RAFT_TOKEN:?set RAFT_TOKEN in your environment}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8083:8080"
    volumes:
      - node3-data:/data

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    environment:
      API_TOKEN: ${API_TOKEN:?set API_TOKEN in your environment}
      QFLAG_NODES: http://node1:8080,http://node2:8080,http://node3:8080
    ports:
      - "3000:3000"
    depends_on:
      - node1
      - node2
      - node3

volumes:
  node1-data:
  node2-data:
  node3-data:
